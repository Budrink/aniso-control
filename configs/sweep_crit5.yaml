dim: 2

# Waste-heat-dominated regime:
# - Stable plant (controller always stabilizes x)
# - Very LOW external heating → most energy comes from CONTROL waste heat
# - High eta_ctrl → significant waste heat feedback
# - Melt response → waste heat degrades barrier
# - Sweep l0 (resolution coupling): at high l0, observation is noisy,
#   Proportional wastes effort fighting noise, AnisoAware is efficient
# Key metric: confinement quality and barrier integrity, not |x|.

grid:
  Nx: 32
  Ny: 32
  D_E: 0.5
  D_x: 0.15
  D_G: 0.04
  gamma_diss: 0.4     # very low cooling → energy from waste heat accumulates
  kappa_tau: 2.0       # moderate melt
  noise_amp: 1.0
  g_noise_init: 0.08
  eta_ctrl: 1.0        # ALL control effort → heat
  wall_absorb: true
  wall_radius: 0.38
  heat_profile:
    cx: 0.5
    cy: 0.5
    rx: 0.20
    ry: 0.20
    peak: 1.0

time:
  dt: 0.01

plant:
  # Stable oscillator: eigenvalues -0.1 ± 0.5i
  A: [[-0.1, 0.5], [-0.5, -0.1]]
  B: [[1, 0], [0, 1]]
  w: [0.4, 0.25]       # strong disturbance → controller MUST work
  x0: [0, 0]

initial_G: identity
coupling:
  type: isotropic
  alpha: 0.3
  gamma: 1.2

relaxation:
  tau: 1.5

g_response:
  type: melt

heater:
  type: constant
  power: 0.5           # MINIMAL external heating → waste heat dominates

feedback:
  type: traceless
  kappa: -0.15

resolution:
  type: metric
  l0: 0.10             # swept
  alpha: 1.5

observation:
  sigma_G: 0.4

eigenvalue_clamp:
  lo: 0.2
  hi: 8.0

seed: 42

controllers:
  - name: Proportional
    type: proportional
    gain: 3.0
    u_max: 20.0
  - name: AnisoAware
    type: aniso_aware
    gain: 3.0
    u_max: 20.0
  - name: EventTriggered
    type: event_triggered
    gain: 4.0
    u_max: 20.0
    trigger: 0.3
    hysteresis: 0.5
    anticipation: 5.0

controller:
  type: proportional
  gain: 3.0
  u_max: 20.0

sweep:
  param: resolution.l0
  range: [0.01, 0.60, 0.02]
  steps: 5000
  warmup: 500

output:
  csv: sweep_crit5.csv
