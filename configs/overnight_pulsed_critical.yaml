dim: 2

# OVERNIGHT SWEEP C: Pulsed Heater in Critical Zone
# 2D: heater.power vs heater.duty (pulsed heater)
# Same aggressive regime as thermal runaway.
# Goal: find where constant heater (duty=1) causes disruption
# but pulsed heater (low duty) allows survival.

grid:
  Nx: 32
  Ny: 32
  D_E: 0.5
  D_x: 0.15
  D_G: 0.04
  gamma_diss: 0.18
  kappa_tau: 5.0
  noise_amp: 1.5
  g_noise_init: 0.10
  eta_ctrl: 1.5
  wall_absorb: true
  wall_radius: 0.38
  heat_profile:
    cx: 0.5
    cy: 0.5
    rx: 0.20
    ry: 0.20
    peak: 1.0

time:
  dt: 0.01

plant:
  A: [[-0.05, 0.5], [-0.5, -0.05]]
  B: [[1, 0], [0, 1]]
  w: [0.5, 0.3]
  x0: [0, 0]

initial_G: identity
coupling:
  type: isotropic
  alpha: 0.35
  gamma: 1.5

relaxation:
  tau: 1.5

g_response:
  type: melt

heater:
  type: pulsed
  power: 3.0
  period: 1.5
  duty: 0.5

feedback:
  type: traceless
  kappa: -0.20

resolution:
  type: metric
  l0: 0.50
  alpha: 2.0

observation:
  sigma_G: 0.5

eigenvalue_clamp:
  lo: 0.2
  hi: 8.0

seed: 42

controllers:
  - name: Proportional
    type: proportional
    gain: 3.0
    u_max: 20.0
  - name: AnisoAware
    type: aniso_aware
    gain: 3.0
    u_max: 20.0
  - name: EventTriggered
    type: event_triggered
    gain: 4.0
    u_max: 20.0
    trigger: 0.3
    hysteresis: 0.5
    anticipation: 5.0
  - name: PID
    type: pid
    kp: 3.0
    ki: 0.5
    kd: 0.1
    u_max: 20.0
    dt: 0.01

controller:
  type: proportional
  gain: 3.0
  u_max: 20.0

sweep2d:
  param1:
    name: heater.power
    range: [0.5, 6.0, 0.40]
  param2:
    name: heater.duty
    range: [0.10, 1.00, 0.06]
  steps: 5000
  warmup: 500

output:
  csv: overnight_pulsed_critical.csv
