dim: 2

grid:
  Nx: 32
  Ny: 32
  D_E: 0.5
  D_x: 0.5
  gamma_diss: 0.3
  kappa_tau: 20.0
  noise_amp: 1.0
  g_noise_init: 0.05
  eta_ctrl: 0.8
  wall_absorb: true
  wall_radius: 0.45
  heat_profile:
    cx: 0.5
    cy: 0.5
    rx: 0.2
    ry: 0.2
    peak: 1.0

time:
  dt: 0.005

plant:
  # Strongly unstable: eigenvalues +0.5 +/- 0.5i
  A: [[0.5, 0.5], [-0.5, 0.5]]
  B: [[1, 0], [0, 1]]
  w: [0.1, 0.05]
  x0: [0, 0]

initial_G: identity
coupling:
  type: isotropic
  alpha: 1.0
  gamma: 1.0
relaxation:
  tau: 1.0
g_response:
  type: melt
  kappa: 5.0
heater:
  type: constant
  power: 2.0
feedback:
  type: traceless
  kappa: -1.5
observation:
  type: additive
  sigma0: 0.02
  beta: 0.3
eigenvalue_clamp:
  lo: 0.3
  hi: 5.0
seed: 42

controllers:
  - name: Proportional
    type: proportional
    gain: 3.0
    u_max: 3.0
  - name: AnisoAware
    type: aniso_aware
    gain: 3.0
    u_max: 3.0
  - name: EventTriggered
    type: event_triggered
    gain: 3.0
    u_max: 3.0
    trigger: 0.3
    hysteresis: 0.5
    anticipation: 5.0

controller:
  type: proportional
  gain: 3.0
  u_max: 3.0

sweep2d:
  param1:
    name: heater.power
    range: [0.5, 10.0, 0.5]
  param2:
    name: controller.gain
    range: [0.5, 8.0, 0.5]
  steps: 4000
  warmup: 400

output:
  csv: sweep_critical.csv
