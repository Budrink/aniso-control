dim: 2

# Goal: Find the critical boundary between "confined" and "disruption"
# by sweeping heater power vs energy dissipation.
# Uses melt g_response: high E destroys barrier (anisotropy).
# Resolution coupling: heating degrades observation quality.

grid:
  Nx: 32
  Ny: 32
  D_E: 0.5           # energy diffusion through G^{-1}
  D_x: 0.1           # state diffusion
  D_G: 0.02          # barrier structure diffusion (enables cascading)
  gamma_diss: 1.0     # swept
  kappa_tau: 10.0     # moderate sensitivity
  noise_amp: 0.6      # thermal noise (sqrt(E) scaled)
  g_noise_init: 0.05
  eta_ctrl: 0.4       # 40% of control effort becomes heat
  wall_absorb: true
  wall_radius: 0.42   # tight wall — harder to confine
  heat_profile:
    cx: 0.5
    cy: 0.5
    rx: 0.20          # focused heating — creates hot core
    ry: 0.20
    peak: 1.0

time:
  dt: 0.01

plant:
  A: [[-0.1, 0.5], [-0.5, -0.1]]
  B: [[1, 0], [0, 1]]
  w: [0.35, 0.2]     # persistent disturbance — controller must work
  x0: [0, 0]

initial_G: identity
coupling:
  type: isotropic
  alpha: 0.3          # isotropic drive from energy
  gamma: 1.5          # anisotropic drive — forms barrier structure

relaxation:
  tau: 2.0            # slow baseline relaxation

g_response:
  type: melt           # energy destroys barrier
                       # kappa = melt strength (set via kappa_tau mapping)

heater:
  type: constant
  power: 3.0           # swept

feedback:
  type: traceless
  kappa: -0.15

# Resolution-limited observation
resolution:
  type: metric
  l0: 0.05             # moderate base resolution
  alpha: 1.0           # resolution scales with G eigenvalues

observation:
  sigma_G: 0.3         # G estimation noise

eigenvalue_clamp:
  lo: 0.3
  hi: 5.0

seed: 42

controllers:
  - name: Proportional
    type: proportional
    gain: 3.0
    u_max: 20.0
  - name: AnisoAware
    type: aniso_aware
    gain: 3.0
    u_max: 20.0
  - name: EventTriggered
    type: event_triggered
    gain: 4.0
    u_max: 20.0
    trigger: 0.4
    hysteresis: 0.6
    anticipation: 5.0

controller:
  type: proportional
  gain: 3.0
  u_max: 20.0

sweep2d:
  param1:
    name: heater.power
    range: [0.5, 8.0, 0.5]
  param2:
    name: grid.gamma_diss
    range: [0.3, 2.5, 0.2]
  steps: 4000
  warmup: 500

output:
  csv: sweep_critical_find.csv
