dim: 2

# OVERNIGHT SWEEP A: Disruption Phase Diagram
# 2D: heater.power vs gamma_diss
# Aggressive melt + strong resolution coupling.
# Goal: find disruption boundary — different for each controller.
# Expect: AnisoAware survives deeper into hot/low-cooling zone.

grid:
  Nx: 32
  Ny: 32
  D_E: 0.5
  D_x: 0.15
  D_G: 0.04
  gamma_diss: 0.25       # swept axis 2
  kappa_tau: 5.0          # aggressive melt
  noise_amp: 1.5
  g_noise_init: 0.10
  eta_ctrl: 1.5           # high waste heat
  wall_absorb: true
  wall_radius: 0.38
  heat_profile:
    cx: 0.5
    cy: 0.5
    rx: 0.20
    ry: 0.20
    peak: 1.0

time:
  dt: 0.01

plant:
  # Barely stable: eigenvalues -0.05 ± 0.5i
  A: [[-0.05, 0.5], [-0.5, -0.05]]
  B: [[1, 0], [0, 1]]
  w: [0.5, 0.3]
  x0: [0, 0]

initial_G: identity
coupling:
  type: isotropic
  alpha: 0.35
  gamma: 1.5

relaxation:
  tau: 1.5

g_response:
  type: melt

heater:
  type: constant
  power: 2.0              # swept axis 1

feedback:
  type: traceless
  kappa: -0.20

resolution:
  type: metric
  l0: 0.50                # strong resolution coupling
  alpha: 2.0

observation:
  sigma_G: 0.5

eigenvalue_clamp:
  lo: 0.2
  hi: 8.0

seed: 42

controllers:
  - name: Proportional
    type: proportional
    gain: 3.0
    u_max: 20.0
  - name: AnisoAware
    type: aniso_aware
    gain: 3.0
    u_max: 20.0
  - name: EventTriggered
    type: event_triggered
    gain: 4.0
    u_max: 20.0
    trigger: 0.3
    hysteresis: 0.5
    anticipation: 5.0
  - name: PID
    type: pid
    kp: 3.0
    ki: 0.5
    kd: 0.1
    u_max: 20.0
    dt: 0.01

controller:
  type: proportional
  gain: 3.0
  u_max: 20.0

sweep2d:
  param1:
    name: heater.power
    range: [0.5, 5.5, 0.35]
  param2:
    name: grid.gamma_diss
    range: [0.08, 0.50, 0.03]
  steps: 5000
  warmup: 500

output:
  csv: overnight_disruption_map.csv
