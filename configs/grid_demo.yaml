dim: 2

grid:
  Nx: 48
  Ny: 48
  D_E: 0.5           # energy diffusion base coefficient
  D_x: 0.1           # state diffusion coefficient
  gamma_diss: 1.0     # energy dissipation rate
  kappa_tau: 20.0     # anisotropy slows G relaxation
  noise_amp: 0.5      # thermal noise amplitude (scaled by sqrt(E))
  g_noise_init: 0.05  # initial G perturbation
  drive:
    cx: 0.5
    cy: 0.5
    rx: 0.18
    ry: 0.18
    peak: 5.0

time:
  dt: 0.01

plant:
  A: [[-0.1, 0.5], [-0.5, -0.1]]
  B: [[1, 0], [0, 1]]
  w: [0.3, 0.15]
  x0: [0, 0]

initial_G: identity

coupling:
  type: rank1
  alpha: 0.5
  gamma: 1.0

relaxation:
  tau: 1.0

feedback:
  type: traceless
  kappa: -0.15

observation:
  type: additive
  sigma0: 0.02
  beta: 0.3

controllers:
  - name: proportional
    type: proportional
    gain: 3.0
    u_max: 20.0
  - name: aniso_aware
    type: aniso_aware
    gain: 3.0
    u_max: 20.0
  - name: pulsed
    type: pulsed
    gain: 3.0
    u_max: 20.0
    period: 4.0
    duty: 0.5
  - name: event_triggered
    type: event_triggered
    gain: 3.0
    u_max: 20.0
    trigger: 0.5
    hysteresis: 0.6
    anticipation: 5.0

controller:
  type: proportional
  gain: 3.0
  u_max: 20.0

eigenvalue_clamp:
  lo: 0.3
  hi: 5.0

seed: 42
