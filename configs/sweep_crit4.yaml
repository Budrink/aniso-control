dim: 2

# Saturation regime: very noisy observation forces controller to u_max
# Controller constantly fighting noise → massive waste heat
# AnisoAware avoids fighting noise in poorly-observed directions → less saturation
# 1D sweep over heater power to find tipping point

grid:
  Nx: 32
  Ny: 32
  D_E: 0.5
  D_x: 0.15
  D_G: 0.04
  gamma_diss: 0.5     # low cooling — energy accumulates
  kappa_tau: 2.5       # moderate melt
  noise_amp: 1.5       # strong thermal noise
  g_noise_init: 0.1
  eta_ctrl: 1.0        # ALL control effort → heat
  wall_absorb: true
  wall_radius: 0.38
  heat_profile:
    cx: 0.5
    cy: 0.5
    rx: 0.18
    ry: 0.18
    peak: 1.0

time:
  dt: 0.01

plant:
  # Strongly unstable: eigenvalues +1.5 ± 0.5i
  A: [[1.5, 0.5], [-0.5, 1.5]]
  B: [[1, 0], [0, 1]]
  w: [0.3, 0.15]
  x0: [0, 0]

initial_G: identity
coupling:
  type: isotropic
  alpha: 0.3
  gamma: 1.2

relaxation:
  tau: 1.0

g_response:
  type: melt

heater:
  type: constant
  power: 2.0

feedback:
  type: traceless
  kappa: -0.1

resolution:
  type: metric
  l0: 0.50             # EXTREME noise — controller nearly blind
  alpha: 2.0

observation:
  sigma_G: 0.5

eigenvalue_clamp:
  lo: 0.2
  hi: 8.0

seed: 42

controllers:
  - name: Proportional
    type: proportional
    gain: 1.8
    u_max: 3.0
  - name: AnisoAware
    type: aniso_aware
    gain: 1.8
    u_max: 3.0
  - name: EventTriggered
    type: event_triggered
    gain: 2.5
    u_max: 3.0
    trigger: 0.3
    hysteresis: 0.5
    anticipation: 5.0

controller:
  type: proportional
  gain: 1.8
  u_max: 3.0

sweep:
  param: heater.power
  range: [0.0, 6.0, 0.3]
  steps: 5000
  warmup: 500

output:
  csv: sweep_crit4.csv
