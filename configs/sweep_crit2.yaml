dim: 2

# Aggressive tokamak-like regime:
# - Truly unstable plant (must control or x diverges)
# - Strong resolution coupling (heating blinds the controller)
# - High waste heat fraction (control effort self-heats)
# - Melt response (energy destroys barrier)
# Sweep heater power to find the tipping point.

grid:
  Nx: 32
  Ny: 32
  D_E: 0.6
  D_x: 0.2
  D_G: 0.04
  gamma_diss: 0.6     # low cooling — energy builds
  kappa_tau: 3.0       # melt strength (moderate)
  noise_amp: 1.2       # strong thermal noise
  g_noise_init: 0.1
  eta_ctrl: 0.8        # 80% of control effort → heat
  wall_absorb: true
  wall_radius: 0.38    # tight wall
  heat_profile:
    cx: 0.5
    cy: 0.5
    rx: 0.15
    ry: 0.15
    peak: 1.0

time:
  dt: 0.01

plant:
  # Unstable oscillator: eigenvalues +0.5 ± 0.5i
  A: [[0.5, 0.5], [-0.5, 0.5]]
  B: [[1, 0], [0, 1]]
  w: [0.3, 0.15]
  x0: [0, 0]

initial_G: identity
coupling:
  type: isotropic
  alpha: 0.3
  gamma: 1.2

relaxation:
  tau: 1.5

g_response:
  type: melt

heater:
  type: constant
  power: 2.0

feedback:
  type: traceless
  kappa: -0.1

resolution:
  type: metric
  l0: 0.25             # HIGH — observation very noisy
  alpha: 2.0           # scales strongly with G deformation

observation:
  sigma_G: 0.5         # very noisy G estimate

eigenvalue_clamp:
  lo: 0.2
  hi: 8.0

seed: 42

controllers:
  - name: Proportional
    type: proportional
    gain: 1.2
    u_max: 6.0
  - name: AnisoAware
    type: aniso_aware
    gain: 1.2
    u_max: 6.0
  - name: EventTriggered
    type: event_triggered
    gain: 1.8
    u_max: 6.0
    trigger: 0.3
    hysteresis: 0.5
    anticipation: 5.0

controller:
  type: proportional
  gain: 1.2
  u_max: 6.0

sweep:
  param: heater.power
  range: [0.5, 10.0, 0.5]
  steps: 5000
  warmup: 500

output:
  csv: sweep_crit2.csv
