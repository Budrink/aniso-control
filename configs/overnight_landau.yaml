dim: 2

# OVERNIGHT SWEEP D: Landau Phase Transition
# g_response = landau_energy with kappa=0.3 → E_crit ≈ 3.3
# 1D: sweep heater.power to cross critical energy.
# Below E_crit: barrier suppressed (aniso=0). Above: barrier forms spontaneously.
# At very high power: barrier melts from overheating.
# Should show non-monotonic behavior and sharp phase boundary.

grid:
  Nx: 48
  Ny: 48
  D_E: 0.5
  D_x: 0.15
  D_G: 0.04
  gamma_diss: 0.25
  kappa_tau: 0.3          # Landau coupling
  noise_amp: 1.0
  g_noise_init: 0.05
  eta_ctrl: 1.0
  wall_absorb: true
  wall_radius: 0.38
  heat_profile:
    cx: 0.5
    cy: 0.5
    rx: 0.20
    ry: 0.20
    peak: 1.0

time:
  dt: 0.01

plant:
  A: [[-0.1, 0.5], [-0.5, -0.1]]
  B: [[1, 0], [0, 1]]
  w: [0.4, 0.25]
  x0: [0, 0]

initial_G: identity
coupling:
  type: isotropic
  alpha: 0.30
  gamma: 1.2

relaxation:
  tau: 1.5

g_response:
  type: landau_energy

heater:
  type: constant
  power: 1.0

feedback:
  type: traceless
  kappa: -0.15

resolution:
  type: metric
  l0: 0.40
  alpha: 1.5

observation:
  sigma_G: 0.4

eigenvalue_clamp:
  lo: 0.2
  hi: 8.0

seed: 42

controllers:
  - name: Proportional
    type: proportional
    gain: 3.0
    u_max: 20.0
  - name: AnisoAware
    type: aniso_aware
    gain: 3.0
    u_max: 20.0
  - name: EventTriggered
    type: event_triggered
    gain: 4.0
    u_max: 20.0
    trigger: 0.3
    hysteresis: 0.5
    anticipation: 5.0
  - name: PID
    type: pid
    kp: 3.0
    ki: 0.5
    kd: 0.1
    u_max: 20.0
    dt: 0.01

controller:
  type: proportional
  gain: 3.0
  u_max: 20.0

sweep:
  param: heater.power
  range: [0.2, 8.0, 0.25]
  steps: 8000
  warmup: 800

output:
  csv: overnight_landau.csv
